<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubSentry (Subscription Auditor)</title>
    <link rel="stylesheet" href="styles.css">
</head>
</head>
<body>
    <div class="container">
        <h1> SubSentry </h1>
        <input type="text" id="name" placeholder="Enter Subscription">
        <datalist id="plans">
            <option value="Netflix">Netflix</option>
            <option value="Disney+">Disney+</option>
            <option value="YouTube">YouTube Premium</option>
            <option value="HBO Max">HBO Max</option>
            <option value="Amazon Prime Video"">Amazon Prime Video</option>
             <option value="Paramount">Paramount+</option>
            <option value="Spotify">Spotify</option>
            <option value="Apple Music">Apple Music</option>
            <option value="Crunchyroll">Crunchyroll</option>
            <option value="DAZN">DAZN</option>
           
        </datalist>
        <input type="number" id="cost" placeholder="Cost">

        <select id="cycle">
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>
        </select>

        <select id="used">
            <option value="yes">Used Recently</option>
            <option value="no">Not Used (3+ months)</option>
        </select>

        <button onclick="addSubscription()">Add Subscription</button>


            
        <div class="list" id="list"> </div>
        <div class="total" id="total">TOTAL MONTHLY BURN: $0</div>
    </div>
    <script src="script.js"></script>
</body>
</html>0
